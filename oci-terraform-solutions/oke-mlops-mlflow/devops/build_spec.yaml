version: 0.1
component: build
timeoutInSeconds: 3600
shell: bash
env:
  variables:
    PACKAGE_DIR: dist
    PACKAGE_NAME: training_bundle.zip
    JOB_OCID: ""
    COMPARTMENT_OCID: ""
    OCIR_REGION_CODE: "iad"
    OCIR_NAMESPACE: ""
    OCIR_REPOSITORY: "mlflow-training"
    IMAGE_TAG: "latest"
    OCIR_USERNAME: ""
    OCIR_AUTH_TOKEN: ""
steps:
  - type: Command
    name: Install dependencies
    command: |
      python3 -m pip install --upgrade pip
      pip3 install -r training/requirements.txt
  - type: Command
    name: Build and push container image to OCIR
    command: |
      if [ -n "${OCIR_NAMESPACE}" ] && [ -n "${OCIR_USERNAME}" ] && [ -n "${OCIR_AUTH_TOKEN}" ]; then
        bash scripts/build_and_push_ocir_image.sh
      else
        echo "OCIR env vars not fully set. Skipping container build/push."
      fi
  - type: Command
    name: Package training code
    command: |
      rm -rf ${PACKAGE_DIR}
      mkdir -p ${PACKAGE_DIR}
      zip -r ${PACKAGE_DIR}/${PACKAGE_NAME} training scripts
      ls -lah ${PACKAGE_DIR}
  - type: Command
    name: Deploy step - trigger Data Science Job
    command: |
      if [ -n "${JOB_OCID}" ] && [ -n "${COMPARTMENT_OCID}" ]; then
        bash scripts/trigger_datascience_job_run.sh
      else
        echo "JOB_OCID or COMPARTMENT_OCID not set. Skipping Data Science Job trigger."
      fi
outputArtifacts:
  - name: training_bundle
    type: BINARY
    location: ${OCI_PRIMARY_SOURCE_DIR}/${PACKAGE_DIR}/${PACKAGE_NAME}
