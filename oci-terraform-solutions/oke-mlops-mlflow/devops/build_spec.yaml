version: 0.1
component: build
timeoutInSeconds: 3600
shell: bash
env:
  variables:
    PROJECT_ROOT: "oci-terraform-solutions/oke-mlops-mlflow"
    PACKAGE_DIR: dist
    PACKAGE_NAME: training_bundle.zip
    COMPARTMENT_OCID: "ocid1.compartment.oc1..aaaaaaaabnetgxq6jztjv3bhe6q5m7mgeuzivehjev5rsupdnocvssrbbtvq"
    OCIR_REGION_CODE: "iad"
    OCIR_NAMESPACE: "idxlfhtrvfsa"
    OCIR_TRAINING_REPOSITORY: "mlops-training"
    OCIR_SERVING_REPOSITORY: "mlops-serving"
    IMAGE_TAG: "latest"
    OCIR_USERNAME: "idxlfhtrvfsa/prasanth.prasad@oracle.com"
    OCIR_AUTH_TOKEN: ""
    OCIR_AUTH_TOKEN_SECRET_OCID: "ocid1.vaultsecret.oc1.iad.amaaaaaak6zxdwaayveuyoez3pu6g5vypoewcqs637w53w375oeavdtcccya"
steps:
  - type: Command
    name: Install dependencies
    command: |
      if [ -d "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}/training" ]; then
        cd "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}"
      elif [ -d "${OCI_PRIMARY_SOURCE_DIR}/training" ]; then
        cd "${OCI_PRIMARY_SOURCE_DIR}"
      else
        echo "training/ directory not found from OCI_PRIMARY_SOURCE_DIR=${OCI_PRIMARY_SOURCE_DIR}"
        exit 1
      fi
      pip3 install --prefer-binary -r training/requirements.txt
  - type: Command
    name: Build and push container image to OCIR
    command: |
      if [ -d "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}/training" ]; then
        cd "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}"
      else
        cd "${OCI_PRIMARY_SOURCE_DIR}"
      fi
      if [ -n "${OCIR_NAMESPACE}" ] && [ -n "${OCIR_USERNAME}" ] && [ -n "${OCIR_AUTH_TOKEN}" -o -n "${OCIR_AUTH_TOKEN_SECRET_OCID}" ]; then
        export OCIR_REPOSITORY="${OCIR_TRAINING_REPOSITORY}"
        bash scripts/build_and_push_ocir_image.sh
      else
        echo "OCIR env vars not fully set (need namespace, username, and token or secret OCID). Skipping container build/push."
      fi
  - type: Command
    name: Build and push serving image to OCIR
    command: |
      if [ -d "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}/serving" ]; then
        cd "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}"
      elif [ -d "${OCI_PRIMARY_SOURCE_DIR}/serving" ]; then
        cd "${OCI_PRIMARY_SOURCE_DIR}"
      else
        echo "serving/ directory not found from OCI_PRIMARY_SOURCE_DIR=${OCI_PRIMARY_SOURCE_DIR}"
        exit 1
      fi
      if [ -n "${OCIR_NAMESPACE}" ] && [ -n "${OCIR_USERNAME}" ] && [ -n "${OCIR_AUTH_TOKEN}" -o -n "${OCIR_AUTH_TOKEN_SECRET_OCID}" ]; then
        export OCIR_REPOSITORY="${OCIR_SERVING_REPOSITORY}"
        bash scripts/build_and_push_serving_ocir_image.sh
      else
        echo "OCIR env vars not fully set (need namespace, username, and token or secret OCID). Skipping serving image build/push."
      fi
  - type: Command
    name: Package training code
    command: |
      if [ -d "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}/training" ]; then
        cd "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}"
      else
        cd "${OCI_PRIMARY_SOURCE_DIR}"
      fi
      rm -rf ${PACKAGE_DIR}
      mkdir -p ${PACKAGE_DIR}
      zip -r ${PACKAGE_DIR}/${PACKAGE_NAME} training scripts
      ls -lah ${PACKAGE_DIR}
  - type: Command
    name: Trigger Data Science Job
    command: |
      if [ -d "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}/training" ]; then
        cd "${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}"
      elif [ -d "${OCI_PRIMARY_SOURCE_DIR}/training" ]; then
        cd "${OCI_PRIMARY_SOURCE_DIR}"
      else
        echo "training/ directory not found from OCI_PRIMARY_SOURCE_DIR=${OCI_PRIMARY_SOURCE_DIR}"
        exit 1
      fi
      export WAIT_FOR_JOB_RUN=true
      export JOB_RUN_TIMEOUT_SECONDS=5400
      export JOB_RUN_POLL_SECONDS=20
      bash scripts/trigger_datascience_job_run.sh
outputArtifacts:
  - name: training_bundle
    type: BINARY
    location: ${OCI_PRIMARY_SOURCE_DIR}/${PROJECT_ROOT}/${PACKAGE_DIR}/${PACKAGE_NAME}
